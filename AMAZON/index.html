<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Structure</title>
</head>

<body>
    <div style="width: 100vw; height: 100vw; background-color: rgb(242, 239, 140); border: 1px solid ;">
        <div style="width: auto; height: 8vw; background-color: brown;">
            <div
                style="width: auto; height: 5vw; border: 1px solid black; background-color: orange; display: flex; justify-content: space-around; align-items: center;">
                <div style="display: flex; justify-content: space-around; align-items: center; width: 20vw; ">
                    <h3>Amazon</h3>
                    <p>Vadodara</p>
                </div>
                <div style="display: flex;">
                    <input type="text" placeholder="Search Amazon">
                    <button>Search</button>
                </div>
                <div style="display: flex; justify-content: space-around; align-items: center; width: 20vw;">
                    <p>Sign In</p>
                    <p>Cart</p>
                </div>


            </div>
            <div style="width: auto; height: 3vw; background-color: rgb(163, 61, 2); display: flex; justify-content: space-around; align-items: center;">
            <p >All</p>
            <p>Filter</p>
            <p>Best Sellers</p>
            <p>Today's Deals</p>
            </div>



        </div>



    </div>
</body>

</html>
